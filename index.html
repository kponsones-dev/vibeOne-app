<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Pickleball System (VibeCode 6.4.26.745)</title>

<style>
body{
    font-family:Arial;
    padding:20px;
}

.infoBox{
    background:#f5f5f5;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    font-size:14px;
}

.card{
    border:1px solid #ddd;
    padding:10px;
    margin-bottom:15px;
}

.courtsGrid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:12px;
}

.playerBtn{
    background:gray;
    color:white;
    padding:6px;
    margin:3px;
    border:none;
}
.playerBtn.selected{background:#2e7d32;}
.playerBtn.locked{background:#1565c0; opacity:0.6;}

.court{
    border:1px solid #ccc;
    padding:10px;
    border-radius:10px;
}
.court.done{
    background:#e8f5e9;
    border:2px solid #2e7d32;
}

.winBtn{
    background:gray;
    color:white;
    border:none;
    padding:6px;
    margin:3px;
}
.winBtn.selectedA,
.winBtn.selectedB{
    background:green;
}

button{cursor:pointer;}

table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:6px;
}
th{background:#f2f2f2; cursor:pointer;}
</style>
</head>

<body>

<h2>🏓 Pickleball CourtFlow</h2>

<div class="infoBox">
• Add players<br>
• Create fixed teams (optional)<br>
• Start round → smart pairing<br>
• Select winner per court → confirm<br>
• No repeat recent partners<br>
</div>

<div class="card">

<input id="playerName" placeholder="Enter player"
onkeydown="if(event.key==='Enter') addPlayer()">

<button onclick="addPlayer()">Add Player</button>

<div id="players"></div>

<h4>Fixed Teams</h4>
<div id="fixedTeams"></div>

<button onclick="createTeam()">Create Fixed Team</button>

</div>

<div class="card">
Courts:
<input type="number" id="courtCount" value="2" min="1">
<button onclick="start()">Start Round</button>
<button onclick="reset()">Reset</button>
</div>

<div id="courts"></div>

<h3>Leaderboard</h3>

<table>
<thead>
<tr>
<th onclick="sort('name')">Name</th>
<th onclick="sort('wins')">Wins</th>
<th onclick="sort('losses')">Losses</th>
<th onclick="sort('games')">Games</th>
<th>Status</th>
</tr>
</thead>
<tbody id="leader"></tbody>
</table>

<script>

/* ---------------- STORAGE ---------------- */

const STORAGE_KEY = "pickleball_state_v1";

function saveState(){
    const state = {
        players,
        fixedTeams,
        selectedPlayers,
        matches,
        pairHistory,
        sortState,
        matchHistory   // ✅ ADDED ONLY
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState(){
    try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;

        const s = JSON.parse(raw);

        players = s.players || [];
        fixedTeams = s.fixedTeams || [];
        selectedPlayers = s.selectedPlayers || [];
        matches = s.matches || [];
        pairHistory = s.pairHistory || [];
        sortState = s.sortState || {key:"name",asc:true};

        matchHistory = s.matchHistory || []; // ✅ ADDED ONLY

    }catch(e){
        console.error("Failed loading state", e);
    }
}

/* ---------------- STATE ---------------- */

let players=[];
let fixedTeams=[];
let selectedPlayers=[];
let matches=[];
let pairHistory=[];
let matchHistory=[]; // ✅ ADDED ONLY
let HISTORY_LIMIT=3;

let sortState={key:"name",asc:true};

/* ---------------- INIT ---------------- */

loadState();

/* ---------------- PLAYERS ---------------- */

function addPlayer(){
let name=document.getElementById("playerName").value.trim();
if(!name)return;

players.push({
id:crypto.randomUUID(),
name,
wins:0,
losses:0,
games:0
});

document.getElementById("playerName").value="";
renderAll();
saveState();
}

/* ---------------- LOCK ---------------- */

function isLocked(id){
return fixedTeams.some(t=>t.includes(id));
}

/* ---------------- RENDER PLAYERS ---------------- */

function renderPlayers(){

document.getElementById("players").innerHTML=

players.map(p=>{

let selected=selectedPlayers.includes(p.id);
let locked=isLocked(p.id);

return `
<button class="playerBtn ${selected?'selected':''} ${locked?'locked':''}"
onclick="toggle('${p.id}')"
${locked?'disabled':''}>
${p.name}
</button>

<button onclick="editPlayer('${p.id}')">✏️</button>
<button onclick="removePlayer('${p.id}')">🗑️</button><br>
`;
}).join("");

}

/* ---------------- EDIT / DELETE ---------------- */

function editPlayer(id){
let p=players.find(x=>x.id===id);
let n=prompt("Edit name",p.name);
if(!n)return;
p.name=n;
renderAll();
saveState();
}

function removePlayer(id){
players=players.filter(p=>p.id!==id);
fixedTeams=fixedTeams.filter(t=>!t.includes(id));
renderAll();
saveState();
}

/* ---------------- SELECT ---------------- */

function toggle(id){
if(isLocked(id))return;

if(selectedPlayers.includes(id)){
selectedPlayers=selectedPlayers.filter(x=>x!==id);
}else if(selectedPlayers.length<2){
selectedPlayers.push(id);
}
renderPlayers();
saveState();
}

/* ---------------- FIXED TEAM ---------------- */

function createTeam(){
if(selectedPlayers.length!==2){
alert("Select 2 players");
return;
}

fixedTeams.push([...selectedPlayers]);
selectedPlayers=[];
renderAll();
saveState();
}

function renderFixedTeams(){

document.getElementById("fixedTeams").innerHTML=

fixedTeams.map((t,i)=>{

let p1=players.find(p=>p.id===t[0]);
let p2=players.find(p=>p.id===t[1]);

return `
⭐ ${p1?.name||"?"} & ${p2?.name||"?"}
<button onclick="removeTeam(${i})">❌</button><br>
`;
}).join("");

}

function removeTeam(i){
fixedTeams.splice(i,1);
renderAll();
saveState();
}

/* ---------------- PAIRING (UNCHANGED) ---------------- */

function isValidPair(a,b){
for(let r of pairHistory){
if(r.includes(a+"|"+b) || r.includes(b+"|"+a)){
return false;
}
}
return true;
}

function smartPairing(rest){

let pool = [...rest];

pool.sort((a, b) => {
    let pa = players.find(p => p.id === a);
    let pb = players.find(p => p.id === b);
    return (pa?.games || 0) - (pb?.games || 0);
});

let result = [];

while(pool.length >= 2){

let a = pool[0];
let found = false;

for(let i = 1; i < pool.length; i++){
    let b = pool[i];

    if(isValidPair(a, b)){
        result.push({players:[a, b]});
        pool.splice(i, 1);
        pool.splice(0, 1);
        found = true;
        break;
    }
}

if(!found){
    let b = pool[1];
    result.push({players:[a, b]});
    pool.splice(1, 1);
    pool.splice(0, 1);
}

}

return result;
}

/* ---------------- START ---------------- */

function start(){
    let teams=[];
    let used=new Set();

    // 1. Process Fixed Teams safely, calculating their team priority score
    fixedTeams.forEach(t=>{
        let p1 = players.find(p => p.id === t[0]);
        let p2 = players.find(p => p.id === t[1]);
        if(p1 && p2) {
            teams.push({
                id: crypto.randomUUID(),
                players: [t[0], t[1]],
                // Track average games played by the team for priority queueing
                avgGames: ((p1.games || 0) + (p2.games || 0)) / 2
            });
            used.add(t[0]);
            used.add(t[1]);
        }
    });

    // 2. Pair up individual players based on fewest games played
    let rest = players.map(p=>p.id).filter(id=>!used.has(id));
    let pairs = smartPairing(rest);

    pairs.forEach(p=>{
        let p1 = players.find(x => x.id === p.players[0]);
        let p2 = players.find(x => x.id === p.players[1]);
        teams.push({
            id: crypto.randomUUID(),
            players: p.players,
            avgGames: ((p1?.games || 0) + (p2?.games || 0)) / 2
        });
    });

    // 3. PRIORITY SORT: Move teams with lowest play-time to the front of the line
    teams.sort((a, b) => a.avgGames - b.avgGames);

    // 4. COURT CAP: Slice only the number of teams that can actually fit on the courts
    let courts = parseInt(document.getElementById("courtCount").value) || 1;
    let maxTeamsPlaying = courts * 2;
    let playingTeams = teams.slice(0, maxTeamsPlaying);

    // If there is an odd number of teams making the cut, drop the last one so everyone has an opponent
    if (playingTeams.length % 2 !== 0) {
        playingTeams.pop();
    }

    // 5. MATCHUP RANDOMIZATION: Shuffle ONLY the playing teams. 
    // This ensures matchups are random, but benched players are never cheated out of a spot!
    shuffle(playingTeams);

    // 6. Populate matches onto active courts
    matches = [];
    let courtIndex = 1;
    for(let i = 0; i < playingTeams.length; i += 2){
        matches.push({
            id: crypto.randomUUID(),
            court: courtIndex++,
            teamA: playingTeams[i],
            teamB: playingTeams[i+1],
            selectedWinner: null,
            processed: false
        });
    }

    // 7. Track history ONLY for teams that are physically stepping onto a court
    updateHistory(playingTeams);
    
    renderAll();
    saveState();
}

/* ---------------- HISTORY ---------------- */

function updateHistory(playingTeams){
    let round = [];
    playingTeams.forEach(t => {
        round.push(t.players[0] + "|" + t.players[1]);
    });
    
    // Only push if there was actually active gameplay this round
    if (round.length > 0) {
        pairHistory.unshift(round);
        if(pairHistory.length > HISTORY_LIMIT) pairHistory.pop();
    }
}

/* ---------------- COURTS ---------------- */

function renderCourts(){

document.getElementById("courts").innerHTML=

`<div class="courtsGrid">
${matches.map(m=>{

let done=m.processed;

let aSel=m.selectedWinner==='A';
let bSel=m.selectedWinner==='B';

let teamA=m.teamA.players.map(id=>players.find(p=>p.id===id)?.name).join(" & ");
let teamB=m.teamB.players.map(id=>players.find(p=>p.id===id)?.name).join(" & ");

return `
<div class="court ${done?'done':''}">

<b>Court ${m.court}</b>

<hr>

<div>
${teamA} ${done && m.winner==='A' ? "(Winner)" : ""}
</div>

<button class="winBtn ${aSel?'selectedA':''}"
onclick="selectWinner('${m.id}','A')"
${done?'disabled':''}>A Wins</button>

<hr>

<div>
${teamB} ${done && m.winner==='B' ? "(Winner)" : ""}
</div>

<button class="winBtn ${bSel?'selectedB':''}"
onclick="selectWinner('${m.id}','B')"
${done?'disabled':''}>B Wins</button>

<br><br>

${!done ? `
<button onclick="confirmWin('${m.id}')"
${!m.selectedWinner?'disabled':''}>
Confirm Result
</button>
` : ""}

</div>
`;
}).join("")}
</div>`;

renderLeader();
}

/* ---------------- WIN FLOW ---------------- */

function selectWinner(id,team){
let m=matches.find(x=>x.id===id);
if(!m||m.processed)return;

m.selectedWinner=team;
renderAll();
saveState();
}

function confirmWin(id){

let m=matches.find(x=>x.id===id);
if(!m||m.processed||!m.selectedWinner)return;

let team=m.selectedWinner;

m.winner=team;
m.processed=true;

let win=team==='A'?m.teamA.players:m.teamB.players;
let lose=team==='A'?m.teamB.players:m.teamA.players;

win.forEach(id=>{
let p=players.find(x=>x.id===id);
p.wins++;p.games++;
});

lose.forEach(id=>{
let p=players.find(x=>x.id===id);
p.losses++;p.games++;
});

/* ✅ ONLY ADDITION: SAVE FULL MATCH HISTORY */
matchHistory.push({
    id: m.id,
    court: m.court,
    teamA: m.teamA.players,
    teamB: m.teamB.players,
    winner: m.winner,
    timestamp: Date.now()
});

renderAll();
saveState();
}

/* ---------------- LEADERBOARD ---------------- */

function renderLeader(){

let data=[...players];

data.sort((a,b)=>{

if(typeof a[sortState.key]==="string"){
return sortState.asc?
a[sortState.key].localeCompare(b[sortState.key]):
b[sortState.key].localeCompare(a[sortState.key]);
}

return sortState.asc?
a[sortState.key]-b[sortState.key]:
b[sortState.key]-a[sortState.key];

});

document.getElementById("leader").innerHTML=

data.map(p=>`
<tr>
<td><a href="player.html?id=${p.id}" target="_blank">${p.name}</a></td>
<td>${p.wins}</td>
<td>${p.losses}</td>
<td>${p.games}</td>
<td>${getStatus(p.id)}</td>
</tr>
`).join("");

}

function getStatus(id){
for(let m of matches){
if(m.teamA.players.includes(id)||m.teamB.players.includes(id)){
return "🟢 Playing";
}
}
return "🟡 Waiting";
}

/* ---------------- SORT ---------------- */

function sort(k){
if(sortState.key===k){
sortState.asc=!sortState.asc;
}else{
sortState.key=k;
sortState.asc=true;
}
renderLeader();
saveState();
}

/* ---------------- UTIL ---------------- */

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

/* ---------------- RESET ---------------- */

function reset(){
matches=[];
matchHistory=[];
players.forEach(p=>{
p.wins=0;p.losses=0;p.games=0;
});

selectedPlayers=[];
pairHistory=[];
localStorage.removeItem(STORAGE_KEY);
renderAll();
saveState();
}

/* ---------------- MASTER RENDER ---------------- */

function renderAll(){
renderPlayers();
renderFixedTeams();
renderCourts();
renderLeader();
}

renderAll();

</script>

</body>
</html>
